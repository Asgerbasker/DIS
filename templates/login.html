<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dictionary Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-body-tertiary">
    <main class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
        <div class="row w-100 justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 mb-4">Dictionary Login</h1>

                        {% with messages = get_flashed_messages() %}
                            {% if messages %}
                                <div class="mb-3">
                                    {% for message in messages %}
                                        <div class="alert alert-info mb-2" role="alert">{{ message }}</div>
                                    {% endfor %}
                                </div>
                            {% endif %}
                        {% endwith %}

                        <form method="POST" class="vstack gap-3">
                            <input class="form-control" type="text" name="username" placeholder="Username" autocomplete="username" required>
                            <input class="form-control" type="password" name="password" placeholder="Password" autocomplete="current-password" required>
                            <button class="btn btn-primary" type="submit">Login</button>
                        </form>

                        <p class="mt-3 mb-0">
                            Don't have an account?
                            <a href="{{ url_for('createaccount') }}">Create one</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
